<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 미니 프로젝트 모음</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Noto Sans KR', sans-serif; }
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            color: #333;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 50px;
            color: #1a2a6c;
            text-shadow: 0 3px 6px rgba(0,0,0,0.1);
            font-weight: 800;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 0.9);
        }
        .card-icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #FF416C;
        }
        .card-desc {
            font-size: 1.05rem;
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>🚀 내 미니 프로젝트 포트폴리오</h1>
    <div class="grid-container">
        <a href="./gugudan/index.html" class="card">
            <div class="card-icon">✖️</div>
            <div class="card-title">구구단 게임</div>
            <div class="card-desc">어린이를 위한 쉽고 재미있는 구구단 맞추기 게임</div>
        </a>
        <a href="./최저가검색/index.html" class="card">
            <div class="card-icon">🛒</div>
            <div class="card-title">최저가 검색</div>
            <div class="card-desc">원하는 상품의 최저가를 알아보는 모의 사이트</div>
        </a>
        <a href="./dice/index.html" class="card">
            <div class="card-icon">🎲</div>
            <div class="card-title">주사위 게임</div>
            <div class="card-desc">두 개의 주사위를 굴려 합을 맞추는 아케이드</div>
        </a>
        <a href="./gundam-shoe/index.html" class="card">
            <div class="card-icon">🤖👟</div>
            <div class="card-title">건담 신발 던지기</div>
            <div class="card-desc">게이지 타이밍을 맞춰서 신발을 가장 멀리 던져보세요!</div>
        </a>
    </div>
</body>
</html>
